<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lz TV</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
}

/* HERO */
.hero{
  height:380px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(to bottom,#000,transparent,#000),
  url('https://image.tmdb.org/t/p/original') center/cover;
}

.btn{
  background:#fff;
  color:#000;
  padding:14px 30px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
}

/* SECTION */
.section{
  padding:20px;
}

.row{
  display:flex;
  overflow-x:auto;
  gap:15px;
}

.card{
  min-width:260px;
  position:relative;
}

.card img{
  width:100%;
  border-radius:15px;
}

.rank{
  position:absolute;
  bottom:-10px;
  left:0;
  font-size:60px;
  font-weight:900;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>
</head>

<body>

<div class="hero" id="hero">
  <h1>tv</h1>
  <button class="btn">Prueba gratis</button>
</div>

<section class="section">
  <h2>Top 10 Películas</h2>
  <div class="row" id="movies"></div>
</section>

<section class="section">
  <h2>Top 10 Series</h2>
  <div class="row" id="series"></div>
</section>

<div class="nav">
  <div>Inicio</div>
  <div>TV</div>
  <div>Buscar</div>
</div>

<script>

var API_KEY = "38e497c6c1a043d1341416e80915669f";

// cargar películas
fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&language=es`)
.then(res => res.json())
.then(data => {

  var container = document.getElementById("movies");

  data.results.slice(0,10).forEach(function(item, index){

    var card = `
      <div class="card">
        <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
        <div class="rank">${index+1}</div>
        <div>${item.title}</div>
      </div>
    `;

    container.innerHTML += card;

    // HERO dinámico
    if(index === 0){
      document.getElementById("hero").style.background =
      `linear-gradient(to bottom,#000,transparent,#000),
       url(https://image.tmdb.org/t/p/original${item.backdrop_path}) center/cover`;
    }

  });

});

// cargar series
fetch(`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}&language=es`)
.then(res => res.json())
.then(data => {

  var container = document.getElementById("series");

  data.results.slice(0,10).forEach(function(item, index){

    var card = `
      <div class="card">
        <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
        <div class="rank">${index+1}</div>
        <div>${item.name}</div>
      </div>
    `;

    container.innerHTML += card;

  });

});

</script>

</body>
</html>

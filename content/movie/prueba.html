<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  padding-bottom:90px;
}

/* HERO */
.hero{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:75vh;
  background:url('https://image.tmdb.org/t/p/original/puJKgNcWaGgMk5VHanSSomUTpmw.jpg') center/cover no-repeat;
  z-index:0;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#000 15%, transparent 60%);
  z-index:1;
}
.hero .scroll-overlay{
  position:absolute;
  inset:0;
  background:#000;
  opacity:0;
  z-index:2;
  pointer-events:none;
  transition: opacity 0.25s ease-out;
}

/* CONTENIDO */
.container{
  position:relative;
  z-index:2;
  margin-top:20vh;
}

/* TOP BAR */
.top-bar{
  position:fixed;
  top:15px;
  left:15px;
  right:15px;
  display:flex;
  justify-content:space-between;
  z-index:3;
}
.icon-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  background:rgba(0,0,0,.5);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
}

/* HEADER */
.header{
  padding:20px;
}
@media (max-width: 767px) {
  .header { display:flex; flex-direction:column; align-items:center; text-align:center; }
}

/* LOGO */
.logo-title{
  display:block;
  height:auto;
  max-width:220px;
  margin:18px auto;
}
@media (min-width:768px){
  .logo-title{ max-width:340px; margin:15px 0; }
}

/* BOTÓN */
.play-btn{
  margin-top:15px;
  background:#fff;
  color:#000;
  padding:10px 40px;
  border-radius:5px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:10px;
  max-width:125px;
  width:88%;
}

/* SECCIONES */
.section-sinopsis, .section-trailers, .section-reparto, .section-imagenes, .section-detalles{
  padding:20px;
}
h2{
  font-size:22px;
  margin-bottom:12px;
}

/* DETALLES - FONDO GRIS Y ORDENADO */
#details-container{
  background:#1f1f1f;
  padding:20px;
  border-radius:12px;
  line-height:1.8;
  font-size:15px;
}
.detail-item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #333;
}
.detail-item:last-child{
  border-bottom:none;
}
.detail-item strong{
  color:#ccc;
}

/* TRÁILER PEQUEÑO */
#trailers-row .trailer{
  min-width:158px;
  flex-shrink:0;
}
#trailers-row .trailer img{
  width:100%;
  border-radius:12px;
  height:89px;
  object-fit:cover;
}
#trailers-row .trailer-title{
  margin-top:6px;
  font-size:13px;
}

/* REPARTO CIRCULAR */
#cast-row .trailer{
  min-width:110px;
  text-align:center;
}
#cast-row .trailer img{
  width:88px;
  height:88px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid rgba(255,255,255,0.15);
}
#cast-row .trailer-title{
  margin-top:8px;
  font-size:13px;
}

/* IMÁGENES */
#images-row .trailer{
  min-width:158px;
  flex-shrink:0;
}
#images-row .trailer img{
  width:100%;
  border-radius:12px;
  height:89px;
  object-fit:cover;
}

/* ROW */
.row{
  display:flex;
  gap:15px;
  overflow-x:auto;
}
.row::-webkit-scrollbar{display:none;}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
  padding:20px;
}
.modal-content{
  position:relative;
  width:100%;
  max-width:960px;
  aspect-ratio:16/9;
  background:#000;
  border-radius:12px;
  overflow:hidden;
}
.close{
  position:absolute;
  top:-15px;
  right:-15px;
  width:40px;
  height:40px;
  background:#fff;
  color:#000;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  cursor:pointer;
  z-index:10001;
}

/* NAV INFERIOR */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:rgba(30,30,30,.95);
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:1000;
}
.nav div{
  text-align:center;
  font-size:12px;
  color:#aaa;
}
.nav i{
  display:block;
  font-size:20px;
  margin-bottom:4px;
}
.active{color:#0A84FF;}

@media (min-width:768px){
  .nav{display:none;}
  .hero{height:85vh;}
  .container{margin-top:10vh;}
  .header{text-align:left;}
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="scroll-overlay"></div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="icon-btn"><i class="fas fa-arrow-left"></i></div>
  <div style="display:flex; gap:10px;">
    <div class="icon-btn"><i class="fas fa-plus"></i></div>
    <div class="icon-btn"><i class="fas fa-share"></i></div>
  </div>
</div>

<!-- CONTENIDO -->
<div class="container">

  <div class="header">
    <div class="available">Cargando...</div>
    <img class="logo-title" src="">
    <div class="meta">Cargando...</div>
    <div class="play-btn">
      <i class="fas fa-play"></i> Reproducir
    </div>
  </div>

  <!-- SINOPSIS -->
  <section id="sinopsis-section" class="section-sinopsis">
    <div class="description" id="descripcion-texto">Cargando sinopsis...</div>
  </section>

  <!-- TRÁILERS -->
  <section id="trailers-section" class="section-trailers">
    <h2>Tráilers ›</h2>
    <div class="row" id="trailers-row"></div>
  </section>

  <!-- REPARTO -->
  <section id="reparto-section" class="section-reparto">
    <h2>Reparto</h2>
    <div class="row" id="cast-row"></div>
  </section>

  <!-- IMÁGENES RELACIONADAS -->
  <section id="imagenes-section" class="section-imagenes">
    <h2>Imágenes relacionadas</h2>
    <div class="row" id="images-row"></div>
  </section>

  <!-- DETALLES -->
  <section id="detalles-section" class="section-detalles">
    <h2>Detalles</h2>
    <div id="details-container"></div>
  </section>

</div>

<!-- MODAL VIDEO -->
<div id="video-modal" class="modal">
  <div class="modal-content">
    <span id="modal-close" class="close">&times;</span>
    <iframe id="youtube-player" width="100%" height="100%" frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen></iframe>
  </div>
</div>

<script>
  // Cargar menú inferior
  fetch('../../config/nav-menu/bottom-nav.html')
    .then(res => res.text())
    .then(html => {
      const div = document.createElement('div');
      div.innerHTML = html;
      document.body.appendChild(div.firstElementChild);
    })
    .catch(() => console.warn('Menú inferior no cargado'));

  const API_KEY = "38e497c6c1a043d1341416e80915669f";
  const BASE = "https://api.themoviedb.org/3";
  const IMG = "https://image.tmdb.org/t/p/original";

  const params = new URLSearchParams(location.search);
  const id = params.get("id") || "11224";
  const type = params.get("type") || "movie";

  /* ================= DATOS PRINCIPALES ================= */
  fetch(`${BASE}/${type}/${id}?api_key=${API_KEY}&language=es-ES&append_to_response=images`)
    .then(r => r.json())
    .then(d => {
      // Hero
      if (d.backdrop_path) document.querySelector(".hero").style.backgroundImage = `url(${IMG}${d.backdrop_path})`;

      // Logo oficial (prioridad español)
      const logos = d.images?.logos || [];
      let logoUrl = logos.length ? IMG + (logos.find(l => l.iso_639_1 === 'es') || logos[0]).file_path : (d.poster_path ? IMG + d.poster_path : '');
      if (logoUrl) document.querySelector(".logo-title").src = logoUrl;

      document.querySelector(".available").textContent = `Disponible: ${d.release_date || d.first_air_date || "Próximamente"}`;
      document.querySelector(".meta").innerHTML = `⭐ ${d.vote_average ? d.vote_average.toFixed(1) : "N/A"}`;

      document.getElementById("descripcion-texto").textContent = d.overview || "Sin sinopsis disponible.";

      // ====================== DETALLES (fondo gris) ======================
      const genres = d.genres ? d.genres.map(g => g.name).join(', ') : '—';
      const languages = d.spoken_languages ? d.spoken_languages.map(l => l.english_name).join(', ') : '—';
      const companies = d.production_companies ? d.production_companies.map(c => c.name).join(', ') : '—';
      const countries = d.production_countries ? d.production_countries.map(c => c.name).join(', ') : '—';

      const detailsHTML = `
        <div class="detail-item"><strong>Título original</strong><span>${d.original_title || d.original_name || '—'}</span></div>
        <div class="detail-item"><strong>Fecha de estreno</strong><span>${d.release_date || d.first_air_date || '—'}</span></div>
        <div class="detail-item"><strong>Géneros</strong><span>${genres}</span></div>
        <div class="detail-item"><strong>Duración</strong><span>${d.runtime ? d.runtime + ' minutos' : (d.number_of_seasons ? d.number_of_seasons + ' temporadas' : '—')}</span></div>
        <div class="detail-item"><strong>Idioma original</strong><span>${d.original_language ? d.original_language.toUpperCase() : '—'}</span></div>
        <div class="detail-item"><strong>Idiomas hablados</strong><span>${languages}</span></div>
        <div class="detail-item"><strong>Países de producción</strong><span>${countries}</span></div>
        <div class="detail-item"><strong>Compañías productoras</strong><span>${companies}</span></div>
        <div class="detail-item"><strong>Estado</strong><span>${d.status || '—'}</span></div>
        <div class="detail-item"><strong>Popularidad</strong><span>${d.popularity ? d.popularity.toFixed(1) : '—'}</span></div>
        ${d.budget ? `<div class="detail-item"><strong>Presupuesto</strong><span>$${d.budget.toLocaleString('es-ES')}</span></div>` : ''}
        ${d.revenue ? `<div class="detail-item"><strong>Recaudación</strong><span>$${d.revenue.toLocaleString('es-ES')}</span></div>` : ''}
      `;

      document.getElementById("details-container").innerHTML = detailsHTML;
    });

  /* TRÁILER (solo 1) + MODAL */
  fetch(`${BASE}/${type}/${id}/videos?api_key=${API_KEY}&language=es-ES`)
    .then(r => r.json())
    .then(d => {
      const container = document.getElementById("trailers-row");
      const trailer = d.results.find(v => v.site === "YouTube");
      if (trailer) {
        container.innerHTML = `
          <div class="trailer" data-key="${trailer.key}">
            <img src="https://img.youtube.com/vi/${trailer.key}/hqdefault.jpg">
            <div class="trailer-title">${trailer.name}</div>
          </div>`;
        container.querySelector('.trailer').addEventListener('click', () => {
          document.getElementById('youtube-player').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
          document.getElementById('video-modal').style.display = 'flex';
        });
      }
    });

  /* REPARTO */
  fetch(`${BASE}/${type}/${id}/credits?api_key=${API_KEY}`)
    .then(r => r.json())
    .then(d => {
      const container = document.getElementById("cast-row");
      d.cast.slice(0,10).forEach(a => {
        container.innerHTML += `
          <div class="trailer">
            <img src="${a.profile_path ? IMG + a.profile_path : 'https://via.placeholder.com/260x390/222/fff?text=Sin+foto'}">
            <div class="trailer-title">${a.name}</div>
          </div>`;
      });
    });

  /* IMÁGENES RELACIONADAS */
  fetch(`${BASE}/${type}/${id}/images?api_key=${API_KEY}`)
    .then(r => r.json())
    .then(d => {
      const container = document.getElementById("images-row");
      d.backdrops.slice(0,8).forEach(i => {
        container.innerHTML += `<div class="trailer"><img src="${IMG}${i.file_path}"></div>`;
      });
    });

  /* SCROLL + MODAL */
  const overlay = document.querySelector('.scroll-overlay');
  window.addEventListener('scroll', () => {
    overlay.style.opacity = Math.min(window.scrollY / 420, 0.82);
  });

  const modal = document.getElementById('video-modal');
  const closeBtn = document.getElementById('modal-close');
  closeBtn.addEventListener('click', () => {
    modal.style.display = 'none';
    document.getElementById('youtube-player').src = '';
  });
  modal.addEventListener('click', e => {
    if (e.target === modal) {
      modal.style.display = 'none';
      document.getElementById('youtube-player').src = '';
    }
  });
</script>
</body>
</html>
